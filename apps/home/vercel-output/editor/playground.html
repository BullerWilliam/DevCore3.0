<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="google" value="notranslate">
    <meta name="theme-color" content="#00c3ff">
    <meta name="description" content="PenguinMod is a TurboWarp mod that was made to add tons of cool stuff to allow for crazy projects." />
    <title>DevCore - Playground</title>
    <link rel="apple-touch-icon" href="/editor/images/apple-touch-icon.png">
    <link rel="icon" type="image/x-icon" href="./penguinmod.github.io/favicon.ico">
    
    <style>
      :root {
        --devcore-topbar: #00c3ff;
        --devcore-topbar-text: #ffffff;
        --devcore-accent: #ff9f1a;
      }
      #splash {
        position: absolute; width: 100%; height: 100%; top: 0; left: 0;
        display: flex; align-items: center; justify-content: center;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; color: var(--devcore-topbar);
      }
      .tw-loaded #splash, #splash-content { display: none; }
      #splash[splash-theme="dark"] { background-color: #333; color: #fff; }
      #splash-spinner:after {
        content: " "; display: block; width: 64px; height: 64px;
        border-radius: 50%; border: 6px solid; border-color: currentColor transparent currentColor transparent;
        animation: splash-spinner 1.2s linear infinite;
      }
      @keyframes splash-spinner {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JEVT078EB6"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-JEVT078EB6');
    </script>
  </head>
  <body>
    <div id="splash" aria-hidden="true">
      <noscript>
        <h1>Enable JavaScript</h1>
      </noscript>
      <div id="splash-content">
        <div id="splash-spinner"></div>
     </div>
    </div>
    <script>
      (function() {
        const themeKey = 'devcore:theme';
        const defaults = {
          topBar: '#00c3ff',
          topBarText: '#ffffff',
          accent: '#ff9f1a'
        };
        const colorPattern = /^#[0-9a-f]{6}$/i;
        const normalizeColor = (value, fallback) =>
          typeof value === 'string' && colorPattern.test(value.trim()) ? value.trim().toLowerCase() : fallback;
        const applyDevcoreTheme = () => {
          try {
            const raw = localStorage.getItem(themeKey);
            const parsed = raw ? JSON.parse(raw) : defaults;
            const theme = {
              topBar: normalizeColor(parsed?.topBar, defaults.topBar),
              topBarText: normalizeColor(parsed?.topBarText, defaults.topBarText),
              accent: normalizeColor(parsed?.accent, defaults.accent)
            };
            document.documentElement.style.setProperty('--devcore-topbar', theme.topBar);
            document.documentElement.style.setProperty('--devcore-topbar-text', theme.topBarText);
            document.documentElement.style.setProperty('--devcore-accent', theme.accent);
            document.querySelector('meta[name="theme-color"]')?.setAttribute('content', theme.topBar);
          } catch {}
        };

        applyDevcoreTheme();
        document.querySelector('#splash-content').style.display = 'block';
        
        try {var localTheme = localStorage.getItem('tw:theme');} catch (e) {}
        if (localTheme ? localTheme === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches) document.querySelector('#splash').setAttribute('splash-theme', 'dark');
        
        window.addEventListener('storage', (event) => {
          if (event.key === themeKey) applyDevcoreTheme();
        });
      })();
    </script>
    <div id="app"></div>
  <script src="/editor/js/vendors~addon-settings~credits~editor~embed~fullscreen~player~playground.js"></script><script src="/editor/js/vendors~editor~embed~fullscreen~player~playground.js"></script><script src="/editor/js/addon-settings~addons~editor~fullscreen~player~playground.js"></script><script src="/editor/js/editor~embed~fullscreen~player~playground.js"></script><script src="/editor/js/playground.js"></script></body>
</html>
