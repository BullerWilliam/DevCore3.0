<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		
		<meta property="theme-color" content="#00C3FF">
		<meta name="theme-color" content="#00C3FF">
		<meta property="og:type" content="website">
		<meta property="og:image" content="https://penguinmod.com/favicon.ico">
		<meta property="twitter:image" content="https://penguinmod.com/favicon.ico">
        
        <link href="/css/markdown-alert.css" rel="stylesheet" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/arduino-light.min.css">
        <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL,GRAD@100..700,0..1,-50..200&display=swap" rel="stylesheet" />

		<link rel="icon" href="%sveltekit.assets%/favicon.ico" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		%sveltekit.head%

        <style>
            :root {
                --devcore-topbar: #00c3ff;
                --devcore-topbar-text: #ffffff;
                --devcore-accent: #ff9f1a;
            }
            body {
                font-family: Helvetica, Arial, sans-serif;
            }
			a {
    		    color: var(--devcore-accent);
    		}
    		a:visited {
    		    color: var(--devcore-accent);
    		}
            
			/* .sb3-comment-label {
				fill: black !important;
			} */
        </style>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
    <script>
        (() => {
            'use strict';

            const DEVCORE_THEME_KEY = 'devcore:theme';
            const defaultTheme = {
                topBar: '#00c3ff',
                topBarText: '#ffffff',
                accent: '#ff9f1a'
            };
            const colorPattern = /^#[0-9a-f]{6}$/i;
            const normalizeColor = (value, fallback) =>
                typeof value === 'string' && colorPattern.test(value.trim()) ? value.trim().toLowerCase() : fallback;
            const normalizeTheme = (value) => ({
                topBar: normalizeColor(value?.topBar, defaultTheme.topBar),
                topBarText: normalizeColor(value?.topBarText, defaultTheme.topBarText),
                accent: normalizeColor(value?.accent, defaultTheme.accent)
            });
            const applyDevcoreTheme = () => {
                try {
                    const raw = localStorage.getItem(DEVCORE_THEME_KEY);
                    const theme = normalizeTheme(raw ? JSON.parse(raw) : defaultTheme);
                    document.documentElement.style.setProperty('--devcore-topbar', theme.topBar);
                    document.documentElement.style.setProperty('--devcore-topbar-text', theme.topBarText);
                    document.documentElement.style.setProperty('--devcore-accent', theme.accent);
                    document.querySelector('meta[property="theme-color"]')?.setAttribute('content', theme.topBar);
                    document.querySelector('meta[name="theme-color"]')?.setAttribute('content', theme.topBar);
                } catch {}
            };

            // NOTE: We need to parse settings here because no fancy svelte (svelte ALWAYS has some FOUC)
            const settingsUpdated = () => {
                const stringStored = localStorage.getItem('pm:settings') || "{}";
                const savedSettings = JSON.parse(stringStored);

                // NOTE: We call "dark mode" as "dark theme" incase we add others (which is VERY Unlikely but might aswell keep it possible)
                const appTheme = savedSettings.appTheme || "light";

                // NOTE: PM Home listens to theme on body, but We need to tell SvelteUI to render everything in dark mode with *its* class, because the global SvelteUI theme class is better than manually passing our appTheme into each element (what a surprise)
                document.body.setAttribute("class", "");
                document.body.classList.add(`app-theme-${appTheme}`);
                if (appTheme === "dark")
                    document.body.classList.add("penguinmodsvelteui-theme-dark");
            }

            // NOTE: We use StoreSettings' generous document event to listen for dark theme swaps
            applyDevcoreTheme();
            settingsUpdated();
            document.addEventListener("penguinmod-store-settings-updated", () => {
                settingsUpdated();
            });
            window.addEventListener('storage', (event) => {
                if (event.key === DEVCORE_THEME_KEY) applyDevcoreTheme();
            });
        })();
    </script>
</html>
